<!DOCTYPE html>
<html>
<head>
  <title>Streetwear - California Street Market</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
<style>
body {
  margin: 0;
  font-family: Arial, Helvetica, sans-serif;
}

  .btn{
    text-decoration:none;
    color:Black;
    font-size:2.4em;
    text-transform:uppercase;
    letter-spacing:-4px;
  }
  
  .btn:hover{
    opacity:0.1;
  }
    .btna{
      
    text-decoration:none;
    color:Black;
    font-size:1.2em;
    text-transform:uppercase;
    letter-spacing:-2px;
  }
  
  .btna:hover{
    opacity:0.1;
  }
.split {
  height: 100%;
  width: 50%;
  position: fixed;
  z-index: 1;
  top: 0;
  overflow-x: hidden;
  padding-top: 20px;
}

.left {
  left: 0;
  background-color: #f7f7f7;
  opacity:0.2;
}

.right {
  right: 0;
  background-color: #d0d0d0;
  opacity:0.2;
}

  .left:hover{
    opacity:1.0
  }
  
  .right:hover{
    opacity:1.0
  }
.centered {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
}

.centered img {
  width: 150px;
  border-radius: 50%;
}
  
  .footer{
    bottom:0;
    top:90%;
    position:fixed;
    width:100%;
  }
  
  .footerlogo{
      text-decoration:none;
    color:Black;
    font-size:.8em;
    text-transform:uppercase;
    letter-spacing:-1px;
    opacity:0.1;
    float:right;
    margin-right:10%;
  }
  
@media only screen and (max-width:1200px){
  .centered {
  top: 45%;
}
    .footerlogo{
    letter-spacing:-0.5px;
  }
    .btn{
    font-size:1.6em;
    letter-spacing:-0.5px;
  }
  
    .btna{
      
    font-size:1em;
    letter-spacing:-0.5px;
  }
  
  
  }
</style>
</head>
<body>
<div class="split left">
  <div class="centered">
    <a class="btn" href="/shop-all">Shop</a>
    <br><br><br>
    <a class="btna" href="/streetwear-brands">Streetwear Brands</a>
        <br><br>
    <a class="btna" href="/streetwear-hoodies">Streetwear Hoodies</a>
        <br><br>
    <a class="btna" href="/streetwear-shirts">Streetwear Shirts</a>
        <br><br>
    <a class="btna" href="/streetwear-pants">Streetwear Pants</a>
    
  </div>
</div>
<div class="split right">
  <div class="centered">

    <a class="btn" href="/discover-music">
      Discover<br>
      Music</a>
  </div>
</div>
     
  <div class="footer">
  <h2 class="footerlogo">California Street Market</h2>
  </div>
</body>
</html>
