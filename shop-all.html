<!DOCTYPE html>
<html>
<head>
  <title>Shop All - California Street Market</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <meta property="og:site_name" content="Shop All - California Street Market">
<meta property="og:url" content="https://californiastreetmarket.com/shop-all">
<meta property="og:title" content="Shop All - California Street Market">
<meta property="og:type" content="website">
<meta property="og:description" content="Shop All - California Street Market">
<style>
body {margin:0;font-family:Arial}

.topnav {
  overflow: hidden;
  background-color: #f2f2f2;
  width:100%;
}

.topnav a {
  float: left;
  display: block;
  color: #000000;
  text-align: center;
  padding: 14px 20px;
  text-decoration: none;
  font-size: 17px;
  letter-spacing:-0.75px;
  text-transform:uppercase;
  
}

  .active{
    margin-left:28%;
  }

.topnav .icon {
  display: none;
}

.dropdown {
  float: left;
  overflow: hidden;
}

.dropdown .dropbtn {
  font-size: 17px;    
  border: none;
  outline: none;
  color: #000000;
  padding: 14px 16px;
  background-color: inherit;
  font-family: inherit;
  margin: 0;
  letter-spacing:-0.75px;
  text-transform:uppercase;
}

.dropdown-content {
  display: none;
  position: absolute;
  background-color: #f9f9f9;
  min-width: 160px;
  box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2);
  z-index: 1;
}

.dropdown-content a {
  float: none;
  color: black;
  padding: 12px 16px;
  text-decoration: none;
  display: block;
  text-align: left;
}

.topnav a:hover, .dropdown:hover .dropbtn {
  background-color: #555;
  color: white;
}

.dropdown-content a:hover {
  background-color: #555;
  color: white;
}

.dropdown:hover .dropdown-content {
  display: block;
}

@media screen and (max-width: 800px) {
  .topnav a:not(:first-child), .dropdown .dropbtn {
    display: none;
  }
  .topnav a.icon {
    float: right;
    display: block;
  }
}

@media screen and (max-width: 800px) {
  .active{
    margin-left:0px;
  }
  .topnav.responsive {position: relative;}
  .topnav.responsive .icon {
    position: absolute;
    right: 0;
    top: 0;
  }
  .topnav.responsive a {
    float: none;
    display: block;
    text-align: left;
  }
  .topnav.responsive .dropdown {float: none;}
  .topnav.responsive .dropdown-content {position: relative;}
  .topnav.responsive .dropdown .dropbtn {
    display: block;
    width: 100%;
    text-align: left;
  }
}
</style>
</head>
<body>

<div class="topnav" id="myTopnav">
  <a style="opacity:0.35;" href="/" class="active">California Street Market</a>
 
  <div class="dropdown">
    <button class="dropbtn">SHOP
      <i class="fa fa-caret-down"></i>
    </button>
    <div class="dropdown-content">
      <a href="/streetwear-hoodies">Streetwear Hoodies</a>
      <a href="/streetwear-shirts">Streetwear Shirts</a>
      <a href="/streetwear-pants">Streetwear Pants</a>
      <a href="/shop-all">Shop All</a>
    </div>
  </div> 
   <a href="/streetwear-brands">Brands</a>
  <a href="javascript:void(0);" style="font-size:15px;" class="icon" onclick="myFunction()">&#9776;</a>
</div>

<div style="padding-left:16px">
  <h2>Shop All</h2>
</div>

<script>
function myFunction() {
  var x = document.getElementById("myTopnav");
  if (x.className === "topnav") {
    x.className += " responsive";
  } else {
    x.className = "topnav";
  }
}
</script>

</body>
</html>
